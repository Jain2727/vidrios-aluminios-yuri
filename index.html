<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Profesional de Cotizaciones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:"Arial Narrow",Arial,sans-serif;margin:20px}
h2{text-align:center}
input,textarea{padding:4px;font-family:"Arial Narrow";margin:2px}
button{
background:#0b5ed7;
color:#fff;
border:none;
padding:6px 14px;
cursor:pointer;
margin:2px;
}
button:hover{background:#084298}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #000;padding:5px;text-align:center}
tfoot td{font-weight:bold}
#mensaje{color:red;font-weight:bold}
</style>
</head>
<body>

<h2>COTIZACIÓN</h2>

<b id="numCot"></b><br><br>

<b>Cliente:</b> <input id="cliente" size="40">
<b>RUC/DNI:</b> <input id="ruc" size="20"><br>
<b>Dirección:</b> <input id="direccion" size="70"><br><br>

<button onclick="agregarItem()">Agregar Ítem</button>

<table>
<thead>
<tr>
<th>Cant.</th>
<th>Descripción</th>
<th>P.Unit</th>
<th>Total</th>
<th>X</th>
</tr>
</thead>
<tbody id="items"></tbody>
<tfoot>
<tr><td colspan="3">SUBTOTAL</td><td id="subtotal">0.00</td><td></td></tr>
<tr><td colspan="3">IGV 18%</td><td id="igv">0.00</td><td></td></tr>
<tr><td colspan="3">TOTAL</td><td id="total">0.00</td><td></td></tr>
</tfoot>
</table>

<br>

<button onclick="guardar()">Guardar</button>
<button onclick="vistaPrevia()">Vista Previa</button>
<button onclick="descargarPDF()">Descargar PDF</button>
<button onclick="nueva()">Nueva</button>
<button onclick="anular()">Anular</button>
<button onclick="eliminar()">Eliminar</button>
<button onclick="reiniciar()">Eliminar TODO y Reiniciar 0001</button>

<br><br>

Buscar: <input id="buscarTexto">
<button onclick="buscar()">Buscar</button>

<div id="mensaje"></div>

<hr>

<h3>Historial</h3>
<div id="historial"></div>

<script>

let anio = new Date().getFullYear();
let contador = localStorage.getItem("contador") ? parseInt(localStorage.getItem("contador")) : 1;

function actualizarNumero(){
document.getElementById("numCot").innerText =
"COTIZACIÓN N°"+String(contador).padStart(4,'0')+"-"+anio;
}

actualizarNumero();

function agregarItem(){
let fila=document.createElement("tr");
fila.innerHTML=`
<td><input type="number" value="1" onchange="calcular()"></td>
<td><input type="text" style="width:100%"></td>
<td><input type="number" value="0" onchange="calcular()"></td>
<td class="totalItem">0.00</td>
<td><button onclick="this.parentNode.parentNode.remove();calcular()">X</button></td>
`;
document.getElementById("items").appendChild(fila);
}

function calcular(){
let filas=document.querySelectorAll("#items tr");
let subtotal=0;
filas.forEach(f=>{
let c=f.cells[0].children[0].value;
let p=f.cells[2].children[0].value;
let t=c*p;
f.cells[3].innerText=t.toFixed(2);
subtotal+=t;
});
let igv=subtotal*0.18;
let total=subtotal+igv;
document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("igv").innerText=igv.toFixed(2);
document.getElementById("total").innerText=total.toFixed(2);
}

function guardar(){
calcular();
let historial=JSON.parse(localStorage.getItem("historial")||"[]");

let cot={
numero:contador,
anio:anio,
cliente:cliente.value,
ruc:ruc.value,
direccion:direccion.value,
total:total.innerText,
estado:"ACTIVO"
};

historial.push(cot);
localStorage.setItem("historial",JSON.stringify(historial));

contador++;
localStorage.setItem("contador",contador);

nueva();
cargarHistorial();
actualizarNumero();
}

function nueva(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("items").innerHTML="";
subtotal.innerText="0.00";
igv.innerText="0.00";
total.innerText="0.00";
mensaje.innerText="";
actualizarNumero();
}

function eliminar(){
let historial=JSON.parse(localStorage.getItem("historial")||"[]");
let numActual=contador-1;
historial=historial.filter(h=>h.numero!=numActual);
localStorage.setItem("historial",JSON.stringify(historial));
cargarHistorial();
}

function anular(){
let historial=JSON.parse(localStorage.getItem("historial")||"[]");
let numActual=contador-1;
historial.forEach(h=>{if(h.numero==numActual)h.estado="ANULADO"});
localStorage.setItem("historial",JSON.stringify(historial));
cargarHistorial();
}

function reiniciar(){
if(confirm("¿Eliminar TODAS las cotizaciones y volver a 0001?")){
localStorage.removeItem("historial");
localStorage.removeItem("contador");
contador=1;
actualizarNumero();
cargarHistorial();
}
}

function buscar(){
let texto=document.getElementById("buscarTexto").value.toLowerCase();
let historial=JSON.parse(localStorage.getItem("historial")||"[]");
let resultado=historial.filter(h=>
String(h.numero)==texto ||
h.cliente.toLowerCase().includes(texto) ||
h.ruc.toLowerCase().includes(texto)
);
if(resultado.length==0){
mensaje.innerText="NO HAY DATOS";
}else{
mensaje.innerText="";
alert("Encontrados: "+resultado.length);
}
}

function cargarHistorial(){
let historial=JSON.parse(localStorage.getItem("historial")||"[]");
let html="<table><tr><th>N°</th><th>Cliente</th><th>RUC</th><th>Total</th><th>Estado</th></tr>";
historial.forEach(h=>{
html+=`<tr>
<td>${String(h.numero).padStart(4,'0')}-${h.anio}</td>
<td>${h.cliente}</td>
<td>${h.ruc}</td>
<td>${h.total}</td>
<td>${h.estado}</td>
</tr>`;
});
html+="</table>";
document.getElementById("historial").innerHTML=html;
}

function vistaPrevia(){
calcular();
alert("Vista previa:\nCliente: "+cliente.value+"\nTotal: "+total.innerText);
}

function descargarPDF(){
calcular();
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.setFont("helvetica");
doc.text(document.getElementById("numCot").innerText,20,20);
doc.text("Cliente: "+cliente.value,20,30);
doc.text("RUC: "+ruc.value,20,40);
doc.text("Total: "+total.innerText,20,50);
doc.save("Cotizacion_"+String(contador-1).padStart(4,'0')+".pdf");
}

cargarHistorial();

</script>

</body>
</html>
