<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VIDRIOS Y ALUMINIOS YURI - Sistema Profesional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ===== TU MISMO ESTILO ORIGINAL ===== */
body{
font-family:'Arial Narrow', Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#dfe9f3,#ffffff);
}

#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1f4e79;
}
.login-box{
background:white;
padding:35px;
width:340px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.login-box input{
width:100%;
margin-bottom:10px;
padding:8px;
font-family:'Arial Narrow';
}

button{
background:#1f4e79;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
font-size:13px;
font-family:'Arial Narrow';
}
button:hover{background:#163a5a;}

#app{display:none;padding:20px;}
.controls{text-align:center;margin-bottom:20px;}
.preview-mode button{display:none !important;}
.preview-mode .logo-btn{display:none !important;}

#a4{
width:794px;
height:1123px;
background:white;
margin:auto;
padding:40px;
box-sizing:border-box;
position:relative;
line-height:1.35;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.header{text-align:center;position:relative;}
.header h1{
margin:0;
font-size:40px;
font-weight:800;
color:#1f4e79;
}
.header h2{margin:2px 0;font-size:18px;font-weight:bold;}

.logo{width:110px;position:absolute;top:0;}
.logo-left{left:0;}
.logo-right{right:0;}

.direccion-input{width:70%;}

.cliente input{width:18%;margin-right:6px;}

.editable{
border:1px solid #1f4e79;
padding:3px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
table-layout:fixed;
}
th{
background:#1f4e79;
color:white;
padding:6px;
font-size:13px;
}
td{
border:1px solid #333;
padding:4px;
font-size:13px;
}
td input,td textarea,td select{
width:100%;
box-sizing:border-box;
}

.totales{text-align:right;margin-top:10px;font-size:15px;}

#historial{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
.no-data{color:red;font-weight:bold;}
</style>
</head>

<body>

<div id="login">
<div class="login-box">
<h3>Inicio de Sesión</h3>
<input placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">
<br><br>
<button style="width:100%;" onclick="entrar()">Ingresar</button>
</div>
</div>

<div id="app">

<div class="controls">
<button onclick="vistaPrevia()">Vista Previa</button>
<button onclick="descargarPDF()">Descargar PDF</button>
<button onclick="guardarCotizacion()">Guardar</button>
<button onclick="nuevaCotizacion()">Nueva</button>
</div>

<div id="a4">

<div class="header">
<h1>VIDRIOS Y ALUMINIOS YURI</h1>
<h2>YURI HERMOZA PUELLES</h2>
RUC: 10617365036<br>
Dirección:
<input id="direccionLocal" class="editable direccion-input"
value="APV. LAS JOYAS, SAN SEBASTIAN - CUSCO - CUSCO">
<hr>
</div>

<b>COTIZACIÓN N° <span id="numCot"></span></b><br><br>

<b>CLIENTE:</b>
Nombre: <input id="clienteNombre" class="editable">
DNI/RUC: <input id="clienteDoc" class="editable">
Teléfono: <input id="clienteTel" class="editable">
Dirección: <input id="clienteDir" class="editable" style="width:30%;">

<table id="tabla">
<thead>
<tr>
<th>Item</th>
<th>Descripción</th>
<th>Cant</th>
<th>P.Unit</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="totales">
<b>Total: S/ <span id="total">0.00</span></b>
</div>

</div>

<div id="historial">
<h3>Historial de Cotizaciones</h3>
Buscar: <input id="buscar" onkeyup="filtrar()">
<table>
<thead>
<tr>
<th>N°</th>
<th>Cliente</th>
<th>Fecha</th>
<th>Total</th>
<th>PDF</th>
<th>Cargar</th>
<th>Eliminar</th>
</tr>
</thead>
<tbody id="listaHistorial"></tbody>
</table>
<div id="mensajeHistorial" class="no-data"></div>
</div>

</div>

<script>
let historial=JSON.parse(localStorage.getItem("historial"))||[];
let contador=historial.length>0?historial.length:0;

function entrar(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
mostrarHistorial();
}

function nuevaCotizacion(){
if(historial.length===0){contador=0;}
contador++;
document.getElementById("numCot").innerText=String(contador).padStart(4,'0')+"-2026";
document.querySelector("#tabla tbody").innerHTML="";
agregarItem();
}

function agregarItem(){
let tbody=document.querySelector("#tabla tbody");
let fila=document.createElement("tr");
fila.innerHTML=`
<td>${tbody.rows.length+1}</td>
<td><input></td>
<td><input type="number" value="0" onchange="calcular()"></td>
<td><input type="number" value="0" onchange="calcular()"></td>
<td class="sub">0.00</td>`;
tbody.appendChild(fila);
}

function calcular(){
let total=0;
document.querySelectorAll("#tabla tbody tr").forEach(f=>{
let cant=parseFloat(f.children[2].children[0].value)||0;
let pu=parseFloat(f.children[3].children[0].value)||0;
let sub=cant*pu;
f.children[4].innerText=sub.toFixed(2);
total+=sub;
});
document.getElementById("total").innerText=total.toFixed(2);
}

function guardarCotizacion(){
let numero=document.getElementById("numCot").innerText;
if(!numero){alert("Presione NUEVA primero");return;}

html2pdf().from(document.getElementById("a4")).outputPdf('datauristring').then(pdf=>{
let items=[];
document.querySelectorAll("#tabla tbody tr").forEach(f=>{
items.push({
desc:f.children[1].children[0].value,
cant:f.children[2].children[0].value,
pu:f.children[3].children[0].value
});
});

let data={
numero,
cliente:document.getElementById("clienteNombre").value,
fecha:new Date().toLocaleDateString(),
total:document.getElementById("total").innerText,
items,
pdf
};

historial.push(data);
localStorage.setItem("historial",JSON.stringify(historial));
mostrarHistorial();
});
}

function mostrarHistorial(){
let tbody=document.getElementById("listaHistorial");
tbody.innerHTML="";
if(historial.length===0){
document.getElementById("mensajeHistorial").innerText="NO HAY DATOS";
contador=0;
return;
}
document.getElementById("mensajeHistorial").innerText="";
historial.forEach((h,i)=>{
tbody.innerHTML+=`
<tr>
<td>${h.numero}</td>
<td>${h.cliente}</td>
<td>${h.fecha}</td>
<td>${h.total}</td>
<td><button onclick="verPDF(${i})">Ver</button></td>
<td><button onclick="cargar(${i})">Cargar</button></td>
<td><button onclick="eliminar(${i})">X</button></td>
</tr>`;
});
}

function verPDF(i){
let win=window.open();
win.document.write('<iframe width="100%" height="100%" src="'+historial[i].pdf+'"></iframe>');
}

function cargar(i){
let h=historial[i];
document.getElementById("numCot").innerText=h.numero;
document.getElementById("clienteNombre").value=h.cliente;
document.querySelector("#tabla tbody").innerHTML="";
h.items.forEach(item=>{
agregarItem();
let fila=document.querySelector("#tabla tbody tr:last-child");
fila.children[1].children[0].value=item.desc;
fila.children[2].children[0].value=item.cant;
fila.children[3].children[0].value=item.pu;
});
calcular();
}

function eliminar(i){
if(confirm("¿Eliminar cotización?")){
historial.splice(i,1);
localStorage.setItem("historial",JSON.stringify(historial));
mostrarHistorial();
}
}

function filtrar(){
let f=document.getElementById("buscar").value.toLowerCase();
document.querySelectorAll("#listaHistorial tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(f)?"":"none";
});
}

function vistaPrevia(){
document.getElementById("a4").classList.toggle("preview-mode");
}

function descargarPDF(){
html2pdf().from(document.getElementById("a4")).save();
}
</script>

</body>
</html>
