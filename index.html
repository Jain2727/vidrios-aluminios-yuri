<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizaciones - Vidrios y Aluminio Yuri</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

h1,h2,h3{margin:5px 0}

input, select{
padding:6px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:7px 12px;
border:none;
border-radius:5px;
cursor:pointer;
background:#0b5394;
color:white;
}

button:hover{opacity:.9}

.container{
width:95%;
margin:auto;
padding:10px;
}

/* LOGIN */
#loginBox{
max-width:400px;
margin:80px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.password-container{
position:relative;
}

.password-container span{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* ENCABEZADO */
.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
width:100px;
height:80px;
border:1px dashed #aaa;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.empresa{
text-align:center;
flex:1;
}

.empresa h1{
font-size:28px;
color:#0b5394;
margin:0;
}

.empresa h2{
margin:0;
font-weight:bold;
}

.section{
margin-top:15px;
}

.row{
display:flex;
gap:20px;
margin-bottom:5px;
}

.label-box{
border-bottom:1px solid #000;
min-width:200px;
}

/* CLIENTE PDF */
.cliente-pdf{
background:#d9e7fb;
padding:10px;
border-radius:5px;
margin-top:10px;
}

/* TABLA */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table, th, td{
border:1px solid black;
}

th{
background:#0b5394;
color:white;
}

th, td{
padding:6px;
text-align:center;
}

/* PIE */
.footer{
background:#0b5394;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
font-style:italic;
width:100%;
}

/* OCULTAR BOTONES EN PDF */
.no-print{
display:block;
}

.preview-mode .no-print{
display:none;
}

/* VISTA PREVIA */
#preview{
margin-top:30px;
background:white;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.historial{
margin-top:40px;
background:white;
padding:15px;
border-radius:8px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Ingreso de Sesión</h2>
<input type="text" placeholder="RUC / DNI / Correo"><br><br>

<div class="password-container">
<input type="password" id="password" placeholder="Contraseña">
<span onclick="togglePassword()">👁</span>
</div>

<br>
<button onclick="login()">Ingresar</button>
<br><br>
<a href="#">¿Recuperar contraseña?</a>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none">

<div class="container">

<div class="header">
<div class="logo no-print">Logo 1<br><button onclick="modLogo()">Modificar</button></div>

<div class="empresa">
<h1>VIDRIOS Y ALUMINIO YURI</h1>
<h2><b>YURI HERMOZA PUELLE</b></h2>
<input id="direccion" value="Dirección del local editable">
</div>

<div class="logo no-print">Logo 2<br><button onclick="modLogo()">Modificar</button></div>
</div>

<div class="section row">
<div>
Fecha Emisión:<br>
<input id="fecha">
</div>

<div>
Validez:<br>
<input id="validez">
</div>
</div>

<div class="section">
<h3>Cliente</h3>
Nombre:<br>
<input id="cliente"><br>
DNI / RUC:<br>
<input id="dni"><br>
Dirección:<br>
<input id="dirCliente">
</div>

<div class="section">
<h3>Items</h3>
<table id="tablaItems">
<thead>
<tr>
<th>#</th>
<th>Descripción</th>
<th>Unidad</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th class="no-print">Eliminar</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="no-print" onclick="agregarItem()">Agregar Item</button>
</div>

<br>
<button class="no-print" onclick="mostrarVista()">Vista Previa</button>
<button class="no-print" onclick="generarPDF()">Descargar PDF</button>
<button class="no-print" onclick="compartirWhatsApp()">Compartir WhatsApp</button>

<!-- PREVIEW FINAL -->
<div id="preview"></div>

<!-- HISTORIAL -->
<div class="historial">
<h3>Historial de Cotizaciones</h3>
<input id="buscar" placeholder="Buscar por cliente">
<button onclick="buscarHistorial()">Buscar</button>

<table>
<thead>
<tr>
<th>N°</th>
<th>Fecha</th>
<th>Total</th>
<th>Editar</th>
<th>Anular</th>
</tr>
</thead>
<tbody id="historialBody"></tbody>
</table>
</div>

</div>

</div>

<script>
let contador=1;
let historial=[];
let numeroCot=1;

function login(){
document.getElementById("loginBox").style.display="none";
document.getElementById("sistema").style.display="block";
}

function togglePassword(){
let pass=document.getElementById("password");
pass.type= pass.type==="password"?"text":"password";
}

function agregarItem(){
let tabla=document.querySelector("#tablaItems tbody");
let fila=tabla.insertRow();

fila.innerHTML=`
<td>${contador++}</td>
<td><input></td>
<td>
<select>
<option>UND</option>
<option>M2</option>
<option>ML</option>
<option>KG</option>
<option>PAR</option>
<option>JGO</option>
<option>ROLLO</option>
<option>CAJA</option>
<option>LAMINA</option>
<option>SERV</option>
</select>
</td>
<td><input type="number" oninput="calcular(this)"></td>
<td><input type="number" oninput="calcular(this)"></td>
<td class="total">0</td>
<td class="no-print"><button onclick="this.parentNode.parentNode.remove()">X</button></td>
`;
}

function calcular(el){
let fila=el.parentNode.parentNode;
let cant=fila.cells[3].querySelector("input").value;
let precio=fila.cells[4].querySelector("input").value;
fila.querySelector(".total").innerText=(cant*precio)||0;
}

function mostrarVista(){
let preview=document.getElementById("preview");
preview.classList.add("preview-mode");

let tabla=document.querySelector("#tablaItems tbody").innerHTML;

preview.innerHTML=`
<div class="header">
<div class="logo"></div>
<div class="empresa">
<h1>VIDRIOS Y ALUMINIO YURI</h1>
<h2><b>YURI HERMOZA PUELLE</b></h2>
${document.getElementById("direccion").value}
</div>
<div class="logo"></div>
</div>

<div class="row">
<div>Fecha Emisión: ${fecha.value}</div>
<div>Validez: ${validez.value}</div>
</div>

<div class="cliente-pdf">
<b>Cliente:</b> ${cliente.value}<br>
<b>DNI/RUC:</b> ${dni.value}<br>
<b>Dirección:</b> ${dirCliente.value}
</div>

<table>
<thead>
<tr>
<th>#</th><th>Descripción</th><th>Unidad</th><th>Cantidad</th><th>Precio</th><th>Total</th>
</tr>
</thead>
<tbody>${tabla}</tbody>
</table>

<div class="footer">
"Encomienda a Jehová tus obras, y tus pensamientos serán afirmados." – Proverbios 16:3
</div>
`;
}

function generarPDF(){
mostrarVista();
let elemento=document.getElementById("preview");
let nombre=`COTIZACION-${numeroCot++}-${cliente.value}.pdf`;

html2pdf().from(elemento).save(nombre);

historial.push({
numero:numeroCot,
fecha:fecha.value,
cliente:cliente.value,
total:0
});

renderHistorial();
}

function renderHistorial(){
let body=document.getElementById("historialBody");
body.innerHTML="";
historial.forEach((h,i)=>{
body.innerHTML+=`
<tr>
<td>${h.numero}</td>
<td>${h.fecha}</td>
<td>${h.total}</td>
<td><button onclick="alert('Editar próximamente')">Editar</button></td>
<td><button onclick="historial.splice(${i},1);renderHistorial()">Anular</button></td>
</tr>
`;
});
}

function buscarHistorial(){
let filtro=document.getElementById("buscar").value.toLowerCase();
let filas=document.querySelectorAll("#historialBody tr");
filas.forEach(f=>{
f.style.display=f.innerText.toLowerCase().includes(filtro)?"":"none";
});
}

function compartirWhatsApp(){
let texto=`Cotización para ${cliente.value} - Total consultar PDF`;
window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
}
</script>

</body>
</html>
