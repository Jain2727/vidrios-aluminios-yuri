<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Cotización</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial Narrow,Arial,sans-serif;margin:20px}
h2{text-align:center}
input,textarea{padding:4px;font-family:Arial Narrow}
button{
background:#0b5ed7;
color:#fff;
border:none;
padding:6px 12px;
cursor:pointer;
margin:2px;
}
button:hover{background:#084298}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #000;padding:5px;text-align:center}
tfoot td{font-weight:bold}
#mensaje{color:red;font-weight:bold}
#historial table{font-size:14px}
img{max-height:80px}
</style>
</head>
<body>

<h2>COTIZACIÓN</h2>

Número: <span id="numero">0001</span><br><br>

<b>Empresa:</b> <input id="empresa" size="40">
<b>RUC:</b> <input id="rucEmpresa" size="15"><br><br>

<b>Cliente:</b> <input id="cliente" size="50">
<b>RUC/DNI:</b> <input id="ruc" size="20"><br><br>

<b>Dirección:</b> <input id="direccion" size="80"><br><br>

<button onclick="agregarItem()">Agregar Ítem</button>

<table id="tabla">
<thead>
<tr>
<th>Cant.</th>
<th>Descripción</th>
<th>P. Unit</th>
<th>Total</th>
<th>X</th>
</tr>
</thead>
<tbody></tbody>
<tfoot>
<tr>
<td colspan="3">SUBTOTAL</td>
<td id="subtotal">0.00</td>
<td></td>
</tr>
<tr>
<td colspan="3">IGV 18%</td>
<td id="igv">0.00</td>
<td></td>
</tr>
<tr>
<td colspan="3">TOTAL</td>
<td id="total">0.00</td>
<td></td>
</tr>
</tfoot>
</table>

<br>

<button onclick="guardar()">Guardar</button>
<button onclick="editar()">Editar</button>
<button onclick="anular()">Anular</button>
<button onclick="eliminar()">Eliminar</button>
<button onclick="nueva()">Nueva</button>
<button onclick="generarPDF()">Generar PDF</button>

<br><br>

Buscar: <input id="buscarTexto">
<button onclick="buscar()">Buscar</button>

<div id="mensaje"></div>

<hr>

<h3>Historial</h3>
<div id="historial"></div>

<script>

let contador = localStorage.getItem("contador") ? parseInt(localStorage.getItem("contador")) : 1;
document.getElementById("numero").innerText = String(contador).padStart(4,'0');

function agregarItem(){
let fila = document.createElement("tr");
fila.innerHTML=`
<td><input type="number" value="1" onchange="calcular()"></td>
<td><input type="text" style="width:100%"></td>
<td><input type="number" value="0" onchange="calcular()"></td>
<td class="totalItem">0.00</td>
<td><button onclick="this.parentNode.parentNode.remove();calcular()">X</button></td>
`;
document.querySelector("#tabla tbody").appendChild(fila);
}

function calcular(){
let filas=document.querySelectorAll("#tabla tbody tr");
let subtotal=0;
filas.forEach(f=>{
let cant=f.cells[0].querySelector("input").value;
let precio=f.cells[2].querySelector("input").value;
let total=cant*precio;
f.cells[3].innerText=total.toFixed(2);
subtotal+=total;
});
let igv=subtotal*0.18;
let total=subtotal+igv;
document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("igv").innerText=igv.toFixed(2);
document.getElementById("total").innerText=total.toFixed(2);
}

function guardar(){
calcular();
let cot={
numero:contador,
empresa:empresa.value,
rucEmpresa:rucEmpresa.value,
cliente:cliente.value,
ruc:ruc.value,
direccion:direccion.value,
subtotal:subtotal.innerText,
igv:igv.innerText,
total:total.innerText,
estado:"ACTIVO"
};
let historial=localStorage.getItem("historial")?JSON.parse(localStorage.getItem("historial")):[];
historial.push(cot);
localStorage.setItem("historial",JSON.stringify(historial));
contador++;
localStorage.setItem("contador",contador);
nueva();
cargarHistorial();
}

function cargarHistorial(){
let historial=localStorage.getItem("historial")?JSON.parse(localStorage.getItem("historial")):[];
let html="<table><tr><th>N°</th><th>Cliente</th><th>RUC</th><th>Total</th><th>Estado</th></tr>";
historial.forEach(h=>{
html+=`<tr>
<td>${String(h.numero).padStart(4,'0')}</td>
<td>${h.cliente}</td>
<td>${h.ruc}</td>
<td>${h.total}</td>
<td>${h.estado}</td>
</tr>`;
});
html+="</table>";
document.getElementById("historial").innerHTML=html;
}

function buscar(){
let texto=document.getElementById("buscarTexto").value.toLowerCase();
let historial=localStorage.getItem("historial")?JSON.parse(localStorage.getItem("historial")):[];
let encontrado=historial.filter(h=>
String(h.numero)==texto||
h.cliente.toLowerCase().includes(texto)||
h.ruc.toLowerCase().includes(texto)
);
if(encontrado.length==0){
mensaje.innerText="NO HAY DATOS";
}else{
mensaje.innerText="";
alert("Encontrado: "+encontrado.length+" resultado(s)");
}
}

function nueva(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelector("#tabla tbody").innerHTML="";
subtotal.innerText="0.00";
igv.innerText="0.00";
total.innerText="0.00";
numero.innerText=String(contador).padStart(4,'0');
}

function eliminar(){
let num=parseInt(numero.innerText);
let historial=JSON.parse(localStorage.getItem("historial"));
historial=historial.filter(h=>h.numero!=num);
localStorage.setItem("historial",JSON.stringify(historial));
cargarHistorial();
}

function anular(){
let num=parseInt(numero.innerText);
let historial=JSON.parse(localStorage.getItem("historial"));
historial.forEach(h=>{if(h.numero==num)h.estado="ANULADO"});
localStorage.setItem("historial",JSON.stringify(historial));
cargarHistorial();
}

function editar(){
alert("Editar manualmente los datos y volver a guardar.");
}

function generarPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.setFont("helvetica");
doc.text("COTIZACIÓN N° "+numero.innerText,20,20);
doc.text("Cliente: "+cliente.value,20,30);
doc.text("Total: "+total.innerText,20,40);
doc.save("Cotizacion_"+numero.innerText+".pdf");
}

cargarHistorial();

</script>

</body>
</html>
