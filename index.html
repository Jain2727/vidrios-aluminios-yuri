<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VIDRIOS Y ALUMINIOS YURI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
font-family:'Arial Narrow', Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#e8f0f8,#ffffff);
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1f4e79;
}
.login-box{
background:white;
padding:35px;
width:340px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.login-box input{
width:100%;
margin-bottom:10px;
padding:8px;
}
button{
background:#1f4e79;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}
button:hover{background:#163a5a;}
#app{display:none;padding:20px;}

/* A4 */
#a4{
width:794px;
height:1123px;
background:white;
margin:auto;
padding:40px;
box-sizing:border-box;
position:relative;
line-height:1.35;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* LOGOS */
.logo-left, .logo-right{
position:absolute;
top:20px;
width:100px;
height:80px;
object-fit:contain;
}
.logo-left{ left:20px; }
.logo-right{ right:20px; }

/* FIRMA IMG */
#firmaImg{
max-height:80px;
margin-top:5px;
}

/* HEADER */
.header{text-align:center;margin-bottom:15px;}
.header h1{margin:0;font-size:30px;font-weight:900;color:#1f4e79;}
.header h2{margin:2px 0;font-size:17px;font-weight:700;}

.preview-mode button,
.preview-mode input[type="file"]{
display:none !important;
}

.editable{
border:1px solid #1f4e79;
padding:3px;
}
.preview-mode .editable{
border:none;
background:transparent;
}

/* TABLA */
table{width:100%;border-collapse:collapse;margin-top:10px;}
th{background:#1f4e79;color:white;padding:6px;}
td{border:1px solid #333;padding:5px;}
td input,td select{width:100%;border:1px solid #1f4e79;}
.preview-mode td input,
.preview-mode td select{
border:none;background:transparent;
}
.colEliminar{width:60px;}
.preview-mode .colEliminar{display:none;}

.totales{text-align:right;margin-top:10px;font-size:16px;}
.firma{
position:absolute;
bottom:200px;
width:100%;
text-align:center;
}
.footer{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#1f4e79;
color:white;
text-align:center;
padding:15px 0;
}

/* HISTORIAL */
#historial{
margin-top:40px;
background:white;
padding:15px;
border-radius:8px;
}
#historial table{
width:100%;
margin-top:10px;
}
.no-data{
color:red;
font-weight:bold;
text-align:center;
margin-top:10px;
}
.anulada{
background:#ffd6d6;
}
</style>
</head>

<body>

<div id="login">
<div class="login-box">
<h3>Inicio de Sesión</h3>
<input placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">
<label><input type="checkbox" onclick="mostrarPass()"> Mostrar contraseña</label>
<br><br>
<button style="width:100%;" onclick="entrar()">Ingresar</button>
</div>
</div>

<div id="app">

<div style="text-align:center;margin-bottom:15px;">
<button onclick="vistaPrevia()">Vista Previa</button>
<button onclick="guardarCotizacion()">Guardar</button>
<button onclick="descargarPDF()">Descargar PDF</button>
</div>

<div id="a4">

<img id="logoLeft" class="logo-left">
<img id="logoRight" class="logo-right">

<div class="header">
<h1>VIDRIOS Y ALUMINIOS YURI</h1>
<h2>YURI HERMOZA PUELLES</h2>
RUC: 10617365036<br>
</div>

<!-- BOTONES LOGO -->
<div>
<input type="file" onchange="cargarLogo(event,'logoLeft')">
<input type="file" onchange="cargarLogo(event,'logoRight')">
</div>

COTIZACIÓN N° <span id="numCot"></span><br>
Fecha: <input type="date" id="fecha" class="editable"><br><br>

Cliente: <input id="clienteNombre" class="editable"><br><br>

<button onclick="agregarItem()">Agregar Item</button>

<table id="tabla">
<thead>
<tr>
<th>Item</th>
<th>Descripción</th>
<th>Cant</th>
<th>P.Unit</th>
<th>Subtotal</th>
<th class="colEliminar">X</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="totales">
Total: S/ <span id="total">0.00</span>
</div>

<div class="firma">
<input type="file" onchange="cargarFirma(event)">
<br>
<img id="firmaImg">
<br>Firma
</div>

<div class="footer">
CC.HACCA S/N OMACHÁ - PARURO - CUSCO
</div>

</div>

<!-- HISTORIAL -->
<div id="historial">
<h3>HISTORIAL DE COTIZACIONES</h3>

Buscar:
<input id="buscarNumero" placeholder="Número">
<input id="buscarFecha" type="date">
<input id="buscarCliente" placeholder="Cliente">
<button onclick="buscarCotizacion()">Buscar</button>

<div id="resultadoHistorial"></div>
</div>

</div>

<script>
let contador = 0;
let historial = JSON.parse(localStorage.getItem("cotizaciones")) || [];

function entrar(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
nuevaCotizacion();
}

function nuevaCotizacion(){
contador++;
let numero = String(contador).padStart(4,'0')+"-2026";
document.getElementById("numCot").innerText = numero;
document.querySelector("#tabla tbody").innerHTML="";
agregarItem();
}

function mostrarPass(){
let p=document.getElementById("pass");
p.type=p.type==="password"?"text":"password";
}

function agregarItem(){
let tbody=document.querySelector("#tabla tbody");
let fila=document.createElement("tr");
fila.innerHTML=`
<td>${tbody.rows.length+1}</td>
<td><input></td>
<td><input type="number" value="0" onchange="calcular()"></td>
<td><input type="number" value="0" onchange="calcular()"></td>
<td class="sub">0.00</td>
<td class="colEliminar">
<button onclick="this.parentElement.parentElement.remove();calcular()">X</button>
</td>`;
tbody.appendChild(fila);
}

function calcular(){
let total=0;
document.querySelectorAll("#tabla tbody tr").forEach(f=>{
let cant=f.children[2].children[0].value;
let pu=f.children[3].children[0].value;
let sub=cant*pu;
f.querySelector(".sub").innerText=sub.toFixed(2);
total+=sub;
});
document.getElementById("total").innerText=total.toFixed(2);
}

function guardarCotizacion(){
let cot={
numero:document.getElementById("numCot").innerText,
fecha:document.getElementById("fecha").value,
cliente:document.getElementById("clienteNombre").value,
total:document.getElementById("total").innerText,
estado:"ACTIVA"
};
historial.push(cot);
localStorage.setItem("cotizaciones",JSON.stringify(historial));
alert("Cotización guardada");
mostrarHistorial(historial);
}

function mostrarHistorial(lista){
let div=document.getElementById("resultadoHistorial");
if(lista.length===0){
div.innerHTML="<div class='no-data'>NO HAY DATOS</div>";
return;
}
let html="<table><tr><th>N°</th><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>";
lista.forEach((c,i)=>{
html+=`<tr class="${c.estado==='ANULADA'?'anulada':''}">
<td>${c.numero}</td>
<td>${c.fecha}</td>
<td>${c.cliente}</td>
<td>${c.total}</td>
<td>${c.estado}</td>
<td>
<button onclick="editarCot(${i})">Editar</button>
<button onclick="anularCot(${i})">Anular</button>
</td>
</tr>`;
});
html+="</table>";
div.innerHTML=html;
}

function buscarCotizacion(){
let n=document.getElementById("buscarNumero").value;
let f=document.getElementById("buscarFecha").value;
let c=document.getElementById("buscarCliente").value.toLowerCase();
let filtrado=historial.filter(x=>
(!n||x.numero.includes(n)) &&
(!f||x.fecha===f) &&
(!c||x.cliente.toLowerCase().includes(c))
);
mostrarHistorial(filtrado);
}

function editarCot(i){
let c=historial[i];
document.getElementById("numCot").innerText=c.numero;
document.getElementById("fecha").value=c.fecha;
document.getElementById("clienteNombre").value=c.cliente;
}

function anularCot(i){
historial[i].estado="ANULADA";
localStorage.setItem("cotizaciones",JSON.stringify(historial));
mostrarHistorial(historial);
}

function vistaPrevia(){
document.getElementById("a4").classList.toggle("preview-mode");
}

function descargarPDF(){
document.getElementById("a4").classList.add("preview-mode");
html2pdf().from(document.getElementById("a4")).save().then(()=>{
document.getElementById("a4").classList.remove("preview-mode");
});
}

function cargarLogo(e,id){
let reader=new FileReader();
reader.onload=function(){
document.getElementById(id).src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
}

function cargarFirma(e){
let reader=new FileReader();
reader.onload=function(){
document.getElementById("firmaImg").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
}

mostrarHistorial(historial);
</script>

</body>
</html>
