<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VIDRIOS Y ALUMINIOS YURI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

button{
cursor:pointer;
padding:6px 12px;
border:none;
background:#1f4e79;
color:white;
border-radius:4px;
}

button:hover{background:#163a5a;}

input,select{
padding:4px;
border:1px solid #999;
border-radius:3px;
}

header{
text-align:center;
position:relative;
padding:20px;
background:white;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
}

.logo-left{position:absolute; left:20px; top:20px;}
.logo-right{position:absolute; right:20px; top:20px;}

.main-title{
font-size:30px;
font-weight:bold;
}

.sub-title{
font-weight:bold;
}

.section{
padding:20px;
background:white;
margin:20px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #1f4e79;
padding:5px;
text-align:center;
}

th{
background:#1f4e79;
color:white;
}

.footer{
text-align:center;
margin-top:40px;
font-style:italic;
}

.no-print{ }

@media print{
.no-print{
display:none !important;
}
}
</style>
</head>
<body>

<header>
<div class="main-title">VIDRIOS Y ALUMINIOS YURI</div>
<div class="sub-title">YURI HERMOZA PUELLES</div>
</header>

<div class="section" id="documento">

<b>N° Cotización:</b> <span id="numero"></span><br>
<b>Fecha:</b> <input type="date" id="fecha"><br><br>

<b>Cliente:</b> <input id="cliente">
<input id="dni">
<input id="telefono">
<input id="direccion"><br><br>

<table id="tablaItems">
<thead>
<tr>
<th>Item</th>
<th>Descripción</th>
<th>Cant</th>
<th>P.Unit</th>
<th>Subtotal</th>
<th class="no-print">Eliminar</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="no-print" onclick="agregarItem()">Agregar Ítem</button>

<br><br>

<div style="text-align:right">
<b>Subtotal:</b> S/ <span id="subtotal">0.00</span><br>
<b>IGV (18%):</b> S/ <span id="igv">0.00</span><br>
<b>Total:</b> S/ <span id="total">0.00</span>
</div>

<br>

<button class="no-print" onclick="guardarCotizacion()">Guardar</button>
<button class="no-print" onclick="exportarPDF()">Exportar PDF</button>
<button class="no-print" onclick="nuevaCotizacion()">Nueva</button>

</div>

<div class="section">
<h3>Historial</h3>
<input id="buscar" placeholder="Buscar número">
<button onclick="buscar()">Buscar</button>
<table>
<thead>
<tr>
<th>N°</th>
<th>Fecha</th>
<th>Total</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="historial"></tbody>
</table>
</div>

<div class="footer">
"El Señor es mi pastor; nada me faltará." - Salmo 23:1
</div>

<script>

let bloqueado=false;

function generarNumero(){
let año=new Date().getFullYear();
let contador=localStorage.getItem("contador_"+año);

if(!contador){
contador=1;
}else{
contador=parseInt(contador)+1;
}

localStorage.setItem("contador_"+año,contador);

return año+"-"+String(contador).padStart(4,"0");
}

function iniciar(){
let año=new Date().getFullYear();
let contador=localStorage.getItem("contador_"+año) || 0;
let numero=año+"-"+String(contador).padStart(4,"0");
document.getElementById("numero").innerText=numero;
cargarHistorial();
}

function agregarItem(){
if(bloqueado) return;

let tbody=document.querySelector("#tablaItems tbody");
let fila=tbody.insertRow();

fila.innerHTML=`
<td>${tbody.rows.length}</td>
<td contenteditable="true"></td>
<td contenteditable="true" oninput="calcular()"></td>
<td contenteditable="true" oninput="calcular()"></td>
<td>0.00</td>
<td class="no-print"><button onclick="eliminar(this)">X</button></td>
`;
}

function eliminar(btn){
btn.parentElement.parentElement.remove();
calcular();
}

function calcular(){
let subtotal=0;
let filas=document.querySelectorAll("#tablaItems tbody tr");

filas.forEach((fila,i)=>{
fila.cells[0].innerText=i+1;
let cant=parseFloat(fila.cells[2].innerText)||0;
let precio=parseFloat(fila.cells[3].innerText)||0;
let sub=cant*precio;
fila.cells[4].innerText=sub.toFixed(2);
subtotal+=sub;
});

let igv=subtotal*0.18;
let total=subtotal+igv;

document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("igv").innerText=igv.toFixed(2);
document.getElementById("total").innerText=total.toFixed(2);
}

function guardarCotizacion(){

if(bloqueado) return;

let numero=generarNumero();
document.getElementById("numero").innerText=numero;

let cotizacion={
numero:numero,
fecha:document.getElementById("fecha").value,
cliente:document.getElementById("cliente").value,
total:document.getElementById("total").innerText,
estado:"ACTIVO",
items:document.querySelector("#tablaItems tbody").innerHTML
};

let lista=JSON.parse(localStorage.getItem("cotizaciones")||"[]");
lista.push(cotizacion);
localStorage.setItem("cotizaciones",JSON.stringify(lista));

bloqueado=true;
cargarHistorial();
alert("Cotización guardada correctamente");
}

function cargarHistorial(){
let lista=JSON.parse(localStorage.getItem("cotizaciones")||"[]");
let historial=document.getElementById("historial");
historial.innerHTML="";

lista.forEach(c=>{
let fila=historial.insertRow();
fila.innerHTML=`
<td>${c.numero}</td>
<td>${c.fecha}</td>
<td>S/ ${c.total}</td>
<td>${c.estado}</td>
<td>
<button onclick='cargar("${c.numero}")'>Cargar</button>
<button onclick='anular("${c.numero}")'>Anular</button>
</td>
`;
});
}

function cargar(numero){
let lista=JSON.parse(localStorage.getItem("cotizaciones")||"[]");
let c=lista.find(x=>x.numero==numero);

document.getElementById("numero").innerText=c.numero;
document.getElementById("fecha").value=c.fecha;
document.querySelector("#tablaItems tbody").innerHTML=c.items;

bloqueado=true;
calcular();
}

function anular(numero){
let lista=JSON.parse(localStorage.getItem("cotizaciones")||"[]");
lista=lista.map(c=>{
if(c.numero==numero){c.estado="ANULADO";}
return c;
});
localStorage.setItem("cotizaciones",JSON.stringify(lista));
cargarHistorial();
}

function exportarPDF(){
let element=document.getElementById("documento");
html2pdf().from(element).save("Cotizacion.pdf");
}

function nuevaCotizacion(){
bloqueado=false;
document.querySelector("#tablaItems tbody").innerHTML="";
document.getElementById("subtotal").innerText="0.00";
document.getElementById("igv").innerText="0.00";
document.getElementById("total").innerText="0.00";
document.getElementById("fecha").value="";
document.getElementById("cliente").value="";
iniciar();
}

function buscar(){
let valor=document.getElementById("buscar").value;
let filas=document.querySelectorAll("#historial tr");

filas.forEach(f=>{
if(f.innerText.includes(valor)){
f.style.display="";
}else{
f.style.display="none";
}
});
}

iniciar();

</script>

</body>
</html>
