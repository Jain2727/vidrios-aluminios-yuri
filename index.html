<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Profesional de Cotizaciones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background:linear-gradient(135deg,#0d47a1,#1976d2);
color:#333;
}

h2{margin-top:0}

.login{
width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1976d2;
color:white;
}

button:hover{opacity:0.9}

.app{
display:none;
background:#f4f7fb;
min-height:100vh;
padding:20px;
}

.editor{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.preview{
background:white;
padding:40px;
width:800px;
margin:40px auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
width:120px;
height:60px;
background:#e3f2fd;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.blueBox{
background:#e3f2fd;
padding:10px;
margin-top:10px;
}

.items table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.items th,.items td{
border:1px solid #000;
padding:6px;
text-align:center;
}

.footer{
background:#0d47a1;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
width:100%;
}

.footer em{
display:block;
margin-top:10px;
}

.hide-print button{
display:inline-block;
}

.preview .hide-print{
display:none;
}

.password-container{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>Iniciar Sesión</h2>
<input placeholder="RUC / DNI / Correo">
<div class="password-container">
<input type="password" id="password" placeholder="Contraseña">
<span class="eye" onclick="togglePassword()">👁</span>
</div>
<button onclick="login()">Ingresar</button>
<p style="font-size:12px;text-align:center;margin-top:10px;cursor:pointer;">Recuperar contraseña</p>
</div>

<div class="app" id="app">

<div class="editor hide-print">
<h2>Crear Cotización</h2>

<label>Dirección del Local</label>
<input id="direccion" value="Av. Principal 123 - Cusco">

<label>Fecha Emisión</label>
<input type="date" id="fecha">

<label>Validez</label>
<input placeholder="15 días">

<h3>Cliente</h3>
<input id="clienteNombre" placeholder="Nombre del Cliente">
<input placeholder="DNI / RUC">
<input placeholder="Dirección">

<div class="items">
<h3>Ítems</h3>
<table id="itemsTable">
<thead>
<tr>
<th>N°</th>
<th>Descripción</th>
<th>Unidad</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th>Eliminar</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
<button onclick="addItem()">Agregar Ítem</button>
</div>

<button onclick="showPreview()">Vista Previa</button>
<button onclick="generatePDF()">Generar PDF</button>
<button onclick="shareWhatsApp()">Compartir WhatsApp</button>

</div>

<!-- PREVIEW -->
<div id="previewContainer"></div>

<!-- HISTORIAL -->
<div class="editor hide-print">
<h2>Historial</h2>
<input id="searchInput" placeholder="Buscar...">
<button onclick="searchHistory()">Buscar</button>
<table id="historyTable" border="1" width="100%" style="margin-top:10px;">
<tr>
<th>N°</th>
<th>Fecha</th>
<th>Total</th>
<th>Editar</th>
<th>Anular</th>
</tr>
</table>
</div>

</div>

<script>
let contador=1;
let cotizacionNumero=1;
let historial=[];

function togglePassword(){
let pass=document.getElementById("password");
pass.type=pass.type==="password"?"text":"password";
}

function login(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
}

function addItem(){
let table=document.getElementById("itemsTable").getElementsByTagName('tbody')[0];
let row=table.insertRow();
row.innerHTML=`
<td>${contador++}</td>
<td contenteditable="true"></td>
<td>
<select>
<option>UND</option>
<option>KG</option>
<option>LT</option>
<option>CAJA</option>
<option>PAQ</option>
<option>MTS</option>
<option>DOC</option>
<option>SERV</option>
<option>GLB</option>
<option>OTR</option>
</select>
</td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td></td>
<td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
`;
}

function showPreview(){
let previewHTML=createPreviewHTML();
document.getElementById("previewContainer").innerHTML=previewHTML;
}

function createPreviewHTML(){

let cliente=document.getElementById("clienteNombre").value;
let fecha=document.getElementById("fecha").value;
let direccion=document.getElementById("direccion").value;

let itemsHTML="";
let rows=document.querySelectorAll("#itemsTable tbody tr");
rows.forEach(r=>{
let cells=r.querySelectorAll("td");
itemsHTML+=`
<tr>
<td>${cells[0].innerText}</td>
<td>${cells[1].innerText}</td>
<td>${cells[2].innerText}</td>
<td>${cells[3].innerText}</td>
<td>${cells[4].innerText}</td>
<td>${cells[5].innerText}</td>
</tr>
`;
});

return `
<div class="preview" id="pdfContent">
<div class="header">
<div class="logo">LOGO</div>
<div>
<h2>COTIZACIÓN N° ${cotizacionNumero}</h2>
<p>${direccion}</p>
<p>Fecha: ${fecha}</p>
</div>
</div>

<div class="blueBox">
<strong>Cliente:</strong> ${cliente}
</div>

<div class="items">
<table>
<thead>
<tr>
<th>N°</th>
<th>Descripción</th>
<th>Unidad</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
</tr>
</thead>
<tbody>
${itemsHTML}
</tbody>
</table>
</div>

<p style="margin-top:40px;">Firma: ______________________</p>
<p>DNI: ______________________</p>

<div class="footer">
Empresa Profesional SAC<br>
<em>"Todo lo puedo en Aquel que me fortalece" - Filipenses 4:13</em>
</div>
</div>
`;
}

async function generatePDF(){
showPreview();
const { jsPDF } = window.jspdf;
let doc=new jsPDF("p","pt","a4");
let canvas=await html2canvas(document.getElementById("pdfContent"));
let img=canvas.toDataURL("image/png");
doc.addImage(img,"PNG",20,20,555,800);
let cliente=document.getElementById("clienteNombre").value || "CLIENTE";
doc.save(`COTIZACION-${cotizacionNumero}-2026-${cliente}.pdf`);
guardarHistorial();
cotizacionNumero++;
}

function guardarHistorial(){
historial.push({
numero:cotizacionNumero,
fecha:new Date().toLocaleDateString(),
total:"--"
});
actualizarTabla();
}

function actualizarTabla(){
let table=document.getElementById("historyTable");
table.innerHTML=`<tr>
<th>N°</th>
<th>Fecha</th>
<th>Total</th>
<th>Editar</th>
<th>Anular</th>
</tr>`;
historial.forEach(h=>{
table.innerHTML+=`
<tr>
<td>${h.numero}</td>
<td>${h.fecha}</td>
<td>${h.total}</td>
<td><button onclick="showPreview()">Ver</button></td>
<td><button onclick="alert('Anulado')">X</button></td>
</tr>
`;
});
}

function searchHistory(){
let text=document.getElementById("searchInput").value.toLowerCase();
let rows=document.querySelectorAll("#historyTable tr");
rows.forEach((r,i)=>{
if(i===0)return;
r.style.display=r.innerText.toLowerCase().includes(text)?"":"none";
});
}

function shareWhatsApp(){
let cliente=document.getElementById("clienteNombre").value;
let url=`https://wa.me/?text=Cotización para ${cliente}`;
window.open(url);
}

addItem();
</script>

</body>
</html>
