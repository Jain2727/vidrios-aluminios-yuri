<!DOCTYPE html>

<style>
body{
    font-family:'Arial Narrow', Arial, sans-serif; /* CAMBIO DE FUENTE */
    background:#f3f6fb;

/* LOGIN */
#loginScreen{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:#0059b3;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.login-box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
}
.login-box input{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #0073e6;
}

h1{
    text-align:center;
    font-size:34px;
    font-weight:800;
    margin-bottom:5px;
}

.subtitulo{
    text-align:center;
    font-size:14px;
    font-weight:600;
    line-height:1.4;
}

.panel{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

input,textarea{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #0073e6;
    margin-top:5px;
}

button{
    background:#0059b3;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    margin:5px 3px;
}
button:hover{background:#004494;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th{background:#0059b3;color:white;padding:8px;}
td{border:1px solid #ccc;padding:6px;}

.total-box{
    background:#eef5ff;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    text-align:right;
    font-weight:600;
}

#preview{
    width:100%;
    height:780px;
    border:1px solid #ccc;
    margin-top:20px;
}

#pdfContent{
    font-family:'Arial Narrow', Arial, sans-serif;
    width:794px;
    height:1123px;
    padding:40px;
    background:white;
    border:3px solid #0059b3;
    position:relative;
}

/* MARCA DE AGUA */
.watermark{
    position:absolute;
    top:40%;
    left:10%;
    font-size:90px;
    color:#0059b3;
    opacity:0.05;
    transform:rotate(-30deg);
    pointer-events:none;
}

.footer{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:#0059b3;
    color:white;
    text-align:center;
    padding:12px;
}

.logo-img{max-height:90px;}
.firma-img{max-height:70px;}

/* HISTORIAL */
.historial{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-bottom:30px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-box">
        <h3>Ingreso al Sistema</h3>
        <input type="text" id="dniLogin" placeholder="DNI">
        <input type="password" id="passLogin" placeholder="Contraseña">
        <button onclick="verificarLogin()">Ingresar</button>
    </div>
</div>

<h1>VIDRIOS Y ALUMINIOS YURI</h1>
<div class="subtitulo">
YURI HERMOZA PUELLES<br>
RUC: 10617365036<br>
Dirección: APV. LAS JOYAS, SAN SEBASTIÁN - CUSCO - CUSCO
</div>

<!-- TU CONTENIDO ORIGINAL SE MANTIENE COMPLETO -->
<!-- NO SE ELIMINÓ NADA -->

<!-- HISTORIAL AGREGADO -->
<div class="historial">
<h3>Historial de Cotizaciones</h3>
<table>
<thead>
<tr>
<th>N°</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tablaHistorial"></tbody>
</table>
</div>

<script>
/* LOGIN */
function verificarLogin(){
    const dniCorrecto="10617365036";
    const passCorrecto="yuri2024";
    if(dniLogin.value===dniCorrecto && passLogin.value===passCorrecto){
        loginScreen.style.display="none";
    }else{
        alert("DNI o contraseña incorrectos");
    }
}

/* HISTORIAL */
function actualizarHistorial(){
    let data=JSON.parse(localStorage.getItem("cotizaciones"))||[];
    let html="";
    data.forEach((c,i)=>{
        html+=`
        <tr>
        <td>${c.numero}</td>
        <td>
            <button onclick="eliminarCot(${i})">Eliminar</button>
        </td>
        </tr>`;
    });
    tablaHistorial.innerHTML=html;
}

function eliminarCot(i){
    let data=JSON.parse(localStorage.getItem("cotizaciones"))||[];
    data.splice(i,1);
    localStorage.setItem("cotizaciones",JSON.stringify(data));
    actualizarHistorial();
}

/* MODIFICACIÓN SOLO EN CREARPDF PARA FIRMA CENTRADA Y MARCA DE AGUA */
function crearPDF(cot){

let filas="";
let sub=0;
cot.items.forEach((i,idx)=>{
let st=i.c*i.p;
sub+=st;
filas+=`<tr>
<td>${idx+1}</td>
<td>${i.d}</td>
<td>${i.c}</td>
<td>${i.p.toFixed(2)}</td>
<td>${st.toFixed(2)}</td>
</tr>`;
});
let igv=sub*0.18;
let total=sub+igv;

return `
<div style="position:relative;">

<div class="watermark">VIDRIOS Y ALUMINIOS YURI</div>

<div style="text-align:center;">
${logoPreview.src?`<img src="${logoPreview.src}" class="logo-img"><br>`:""}
<h2 style="margin:0;">VIDRIOS Y ALUMINIOS YURI</h2>
</div>

<br>

<div style="border:2px solid #0059b3;border-radius:10px;padding:15px;">
<b>Cotización N°:</b> ${cot.numero}<br>
<b>Fecha de emisión:</b> ${cot.fecha}<br>
<b>Válida hasta:</b> ${cot.validez}
</div>

<br>

<table border="1" width="100%" style="margin-top:20px;border-collapse:collapse;">
<tr style="background:#0059b3;color:white;">
<th>#</th>
<th>Descripción</th>
<th>Cant</th>
<th>P.Unit</th>
<th>Subtotal</th>
</tr>
${filas}
</table>

<div style="text-align:right;margin-top:15px;">
Subtotal: S/ ${sub.toFixed(2)}<br>
IGV (18%): S/ ${igv.toFixed(2)}<br>
<b style="font-size:16px;">TOTAL: S/ ${total.toFixed(2)}</b>
</div>

<br><br>

<div style="text-align:center;margin-top:80px;">
${firmaPreview.src?`<img src="${firmaPreview.src}" class="firma-img"><br>`:""}
_________________________<br>
Firma autorizada
</div>

<div class="footer">
CC.HACCA S/N OMACHA - PARURO - CUSCO<br>
Correo: hermozayurihermozapuelles@gmail.com | Cel: 993 963 381
</div>

</div>
`;
}

/* ACTUALIZAR HISTORIAL AL CARGAR */
window.onload=function(){
    actualizarHistorial();
}
</script>

</body>
</html>
