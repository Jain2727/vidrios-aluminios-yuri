<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>

body{
font-family:'Arial Narrow', Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#dfe9f3,#ffffff);
}
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1f4e79;
}
.login-box{
background:white;
padding:35px;
width:340px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.login-box input{
width:100%;
margin-bottom:10px;
padding:8px;

}
button{
background:#1f4e79;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;

font-family:'Arial Narrow';
}
button:hover{background:#163a5a;}
#app{display:none;padding:20px;}
.controls{text-align:center;margin-bottom:20px;}
.preview-mode button{display:none !important;}
.preview-mode .logo-btn{display:none !important;}
#a4{
width:794px;
height:1123px;
background:white;
margin:auto;
padding:40px;
box-sizing:border-box;
position:relative;
line-height:1.25;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
.header{text-align:center;position:relative;}
.header h1{margin:0;font-size:38px;font-weight:800;color:#1f4e79;}
.header h2{margin:2px 0;font-size:17px;font-weight:bold;}
.logo{width:125px;position:absolute;top:0;}
.logo-left{left:0;}
.logo-right{right:0;}
.logo-btn{position:absolute;top:120px;font-size:11px;}
.direccion-input{width:90%;text-align:center;}
.bloque-superior{display:flex;justify-content:space-between;margin-top:15px;}
.fechas{text-align:right;line-height:1.05;}
.fechas input{margin-bottom:2px;}
.cliente{margin-top:15px;padding:10px;border-radius:6px;}
.preview-mode .cliente{background:#d9e8fb;}
.cliente div{margin-bottom:5px;}
.cliente input{width:75%;}
.editable{border:1px solid #1f4e79;padding:3px;}
.preview-mode .editable{border:none;background:transparent;}
table{width:100%;border-collapse:collapse;margin-top:10px;table-layout:fixed;}
th{background:#1f4e79;color:white;padding:6px;font-size:13px;}
td{border:1px solid #333;padding:4px;font-size:13px;word-wrap:break-word;}
td input,td select,td textarea{
width:100%;border:1px solid #1f4e79;font-family:'Arial Narrow';box-sizing:border-box;
}
.preview-mode td input,
.preview-mode td select,
.preview-mode td textarea{border:none;background:transparent;}
.preview-mode .colEliminar{display:none;}
.totales{text-align:right;margin-top:10px;font-size:15px;}
.metodo{margin-top:20px;}
.firma{position:absolute;bottom:210px;width:100%;text-align:center;}
.firma img{width:210px;margin-bottom:2px;}
.footer{position:absolute;bottom:0;left:0;width:100%;background:#1f4e79;color:white;text-align:center;padding:15px;font-size:13px;}
.versiculo{font-style:italic;margin-top:5px;}
#historial{margin-top:30px;background:white;padding:20px;border-radius:8px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
#historial table th{background:#444;}
.no-data{color:red;font-weight:bold;}
.estado-anulada{color:red;font-weight:bold;}
</style>

<body>

<!-- TODO TU HTML EXACTAMENTE IGUAL (NO MODIFICADO) -->

<!-- PEGO SOLO EL SCRIPT CORREGIDO -->

<script>
let anio = 2026;
let contador = parseInt(localStorage.getItem("contador")) || 1;
let historial = JSON.parse(localStorage.getItem("historial")) || [];
let cotizacionGuardada = false;

function entrar(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
cargarImagenes();
mostrarHistorial();
iniciarNumero();
}

function iniciarNumero(){
document.getElementById("numCot").innerText =
String(contador).padStart(4,'0')+"-"+anio;
cotizacionGuardada = false;
document.querySelector("#tabla tbody").innerHTML="";
agregarItem();
calcular();
}

function mostrarPass(){
let p=document.getElementById("pass");
p.type=p.type==="password"?"text":"password";
}

function nuevaCotizacion(){
if(!cotizacionGuardada){
if(!confirm("La cotización actual no está guardada. ¿Continuar?")) return;
}
iniciarNumero();
}

function agregarItem(){
let tbody=document.querySelector("#tabla tbody");
let fila=document.createElement("tr");
fila.innerHTML=`
<td>${tbody.rows.length+1}</td>
<td><input></td>
<td><textarea rows="2" oninput="autoResize(this)"></textarea></td>
<td><input type="number" value="0" oninput="calcular()"></td>
<td><select>
<option>UND</option><option>M2</option><option>M</option>
<option>KG</option><option>PAR</option><option>SET</option>
</select></td>
<td><input type="number" value="0" oninput="calcular()"></td>
<td class="sub">0.00</td>
<td class="colEliminar"><button onclick="eliminarFila(this)">X</button></td>`;
tbody.appendChild(fila);
}

function autoResize(t){
t.style.height="auto";
t.style.height=t.scrollHeight+"px";
}

function eliminarFila(btn){
btn.parentElement.parentElement.remove();
reordenar();
calcular();
}

function reordenar(){
document.querySelectorAll("#tabla tbody tr").forEach((f,i)=>{
f.children[0].innerText=i+1;
});
}

function calcular(){
let total=0;
document.querySelectorAll("#tabla tbody tr").forEach(f=>{
let cant=parseFloat(f.children[3].children[0].value)||0;
let pu=parseFloat(f.children[5].children[0].value)||0;
let sub=cant*pu;
f.querySelector(".sub").innerText=sub.toFixed(2);
total+=sub;
});
document.getElementById("costo").innerText=total.toFixed(2);
document.getElementById("igv").innerText=(total*0.18).toFixed(2);
document.getElementById("total").innerText=(total*1.18).toFixed(2);
}

function guardarCotizacion(){
let numeroActual=document.getElementById("numCot").innerText;

if(historial.some(h=>h.numero===numeroActual)){
alert("Esta cotización ya fue guardada.");
return;
}

let data={
numero:numeroActual,
fecha:new Date().toLocaleDateString(),
total:document.getElementById("total").innerText,
estado:"ACTIVA"
};

historial.push(data);
localStorage.setItem("historial",JSON.stringify(historial));

contador++;
localStorage.setItem("contador",contador);

cotizacionGuardada = true;

mostrarHistorial();
alert("Cotización guardada correctamente.");
}

function mostrarHistorial(){
let tbody=document.getElementById("listaHistorial");
tbody.innerHTML="";
if(historial.length===0){
document.getElementById("mensajeHistorial").innerText="NO HAY DATOS";
return;
}
document.getElementById("mensajeHistorial").innerText="";
historial.forEach((h,i)=>{
tbody.innerHTML+=`
<tr>
<td>${h.numero}</td>
<td>${h.fecha}</td>
<td>${h.total}</td>
<td class="${h.estado==='ANULADA'?'estado-anulada':''}">${h.estado}</td>
<td><button onclick="cargar(${i})">Cargar</button></td>
<td><button onclick="anular(${i})">Anular</button></td>
</tr>`;
});
}

function anular(i){
historial[i].estado="ANULADA";
localStorage.setItem("historial",JSON.stringify(historial));
mostrarHistorial();
}

function filtrar(){
let f=document.getElementById("buscar").value.toLowerCase();
document.querySelectorAll("#listaHistorial tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(f)?"":"none";
});
}

function vistaPrevia(){
document.getElementById("a4").classList.add("preview-mode");
setTimeout(()=>{
document.getElementById("a4").classList.remove("preview-mode");
},3000);
}

function descargarPDF(){
let element=document.getElementById("a4");
element.classList.add("preview-mode");

let opt={
margin:0,
filename:'Cotizacion_'+document.getElementById("numCot").innerText+'.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
};

html2pdf().set(opt).from(element).save().then(()=>{
element.classList.remove("preview-mode");
});
}

function compartirWhatsApp(){
let numero=document.getElementById("clienteTel").value;
let total=document.getElementById("total").innerText;
let mensaje="Hola, le enviamos su cotización N° "+document.getElementById("numCot").innerText+
" por un total de S/ "+total;
window.open("https://wa.me/51"+numero+"?text="+encodeURIComponent(mensaje));
}

function compartirImagen(){
html2canvas(document.getElementById("a4")).then(canvas=>{
let link=document.createElement("a");
link.download="Cotizacion_"+document.getElementById("numCot").innerText+".png";
link.href=canvas.toDataURL();
link.click();
});
}

function cargarLogo(n){
let input=document.createElement("input");
input.type="file";
input.onchange=e=>{
let reader=new FileReader();
reader.onload=function(){
document.getElementById("logo"+n).src=reader.result;
localStorage.setItem("logo"+n,reader.result);
}
reader.readAsDataURL(e.target.files[0]);
};
input.click();
}

function agregarFirma(){
let input=document.createElement("input");
input.type="file";
input.onchange=e=>{
let reader=new FileReader();
reader.onload=function(){
document.getElementById("firmaImg").src=reader.result;
localStorage.setItem("firmaImg",reader.result);
}
reader.readAsDataURL(e.target.files[0]);
};
input.click();
}

function cargarImagenes(){
if(localStorage.getItem("logo1")) document.getElementById("logo1").src=localStorage.getItem("logo1");
if(localStorage.getItem("logo2")) document.getElementById("logo2").src=localStorage.getItem("logo2");
if(localStorage.getItem("firmaImg")) document.getElementById("firmaImg").src=localStorage.getItem("firmaImg");
}
</script>

</body>
</html>
